name: Build & deploy site

# Copy this file into your CONTENT repo at .github/workflows/deploy.yml.
#
# It builds your site with the Timber generator and deploys it to GitHub Pages on
# every push to main (plus manual runs and a daily rebuild). `main` holds source
# only — the built HTML never enters git; it's uploaded as a Pages artifact and
# deployed directly (no gh-pages branch). See SPEC §12.
#
# It also co-hosts the in-browser editor at /<repo>/edit/ (default; see TIMBER_EDITOR_PATH
# below) on the same Pages site. The editor always ships; it uses paste-a-PAT until you
# run "Setup OAuth broker" to enable "Sign in with GitHub".
#
# One-time setup in your content repo:
#   1. Settings → Pages → Source: "GitHub Actions".
#   2. Pin TIMBER_REF below to a Timber release tag so preview ≡ production.
#   3. For "Sign in with GitHub" (vs paste-a-PAT), run "Setup OAuth broker" (see INSTALL.md).

on:
  push:
    branches: [main]
  workflow_dispatch: {}
  schedule:
    - cron: '0 4 * * *' # daily rebuild (SPEC §15)

permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deploy at a time; let an in-flight deploy finish rather than cancel it.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  TIMBER_REPO: TimAidley/Timber
  TIMBER_REF: main # pin to a Timber release tag

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out this content repo
        uses: actions/checkout@v4

      - name: Check out Timber (pinned)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TIMBER_REPO }}
          ref: ${{ env.TIMBER_REF }}
          path: .timber

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: .timber/pnpm-lock.yaml

      - name: Install Timber deps
        working-directory: .timber
        run: pnpm install --frozen-lockfile

      - name: Build the Timber CLI (generator)
        working-directory: .timber
        run: pnpm --filter "@timber/cli..." build

      - name: Build the site
        run: node .timber/packages/cli/dist/index.js build . _site

      # Co-host the editor at /<repo>/<editor-path>/ — default "edit", overridable with
      # the TIMBER_EDITOR_PATH repo variable (e.g. if a content page already uses /edit/).
      # It ALWAYS ships; its sign-in adapts to config: with a broker URL (committed by the
      # "Setup OAuth broker" workflow) it shows "Sign in with GitHub" — redirect, or device
      # flow when TIMBER_OAUTH_FLOW is 'device'; with no broker it falls back to paste-a-PAT,
      # which needs no Cloudflare or GitHub App. NOTE: if you change the path AND use the
      # redirect flow, register the matching callback URL on your GitHub App.
      - name: Build the editor (/<repo>/edit/)
        run: |
          REPO='${{ github.event.repository.name }}'
          EDITOR_PATH='${{ vars.TIMBER_EDITOR_PATH }}'
          EDITOR_PATH="${EDITOR_PATH:-edit}"                              # default
          EDITOR_PATH="${EDITOR_PATH#/}"; EDITOR_PATH="${EDITOR_PATH%/}"  # strip any slashes
          export TIMBER_BASE="/$REPO/$EDITOR_PATH/"
          export VITE_TIMBER_OWNER='${{ github.repository_owner }}'
          export VITE_TIMBER_REPO="$REPO"
          export VITE_TIMBER_OAUTH_CLIENT_ID='${{ vars.GH_OAUTH_CLIENT_ID }}'
          if [ -f .timber-broker-url ]; then
            VITE_TIMBER_OAUTH_BROKER_URL="$(cat .timber-broker-url)"
            export VITE_TIMBER_OAUTH_BROKER_URL
          fi
          export VITE_TIMBER_OAUTH_FLOW='${{ vars.TIMBER_OAUTH_FLOW }}'
          ( cd .timber && pnpm --filter "@timber/app..." build )
          mkdir -p "_site/$EDITOR_PATH"
          cp -r .timber/packages/app/dist/. "_site/$EDITOR_PATH/"

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
